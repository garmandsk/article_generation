[tool.fastapi]
entrypoint = "main:app"

[tool.ruff]
# Mengikuti standar Python 3.14
target-version = "py314"
line-length = 88

[tool.ruff.lint]
# Mengaktifkan aturan Pyflakes (F), Pycodestyle (E, W), dan Isort (I)
select = ["E", "W", "F", "I"]
ignore = []

# Abaikan pengecekan variabel tak terpakai khusus pada file __init__.py
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]