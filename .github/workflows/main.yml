name: Article Generation CI/CD Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/article_generation-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web/backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      
  restart-hf-space:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Restart HF Spaces
        run: |
          curl -X POST "https://huggingface.co/api/spaces/garmandsk/article_generation-backend/restart" \
          -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"

